# 微信公众号配置
wechat_app_id = "your_app_id"
wechat_app_secret = "your_app_secret"

# 日志配置
[log]
# 日志级别: debug, info, warn, error
level = "debug"
# 日志格式: json, console
format = "json"

# MCP服务配置
[mcp]
# 协议类型: stdio, http, sse
protocol = "http"
# HTTP监听地址
host = "0.0.0.0"
port = 7990

# AI 转换器配置 (Markdown -> 微信公众号 HTML)
[converter]
# 是否启用 AI 转换器
enabled = true
# Anthropic API Key (支持环境变量: ANTHROPIC_API_KEY)
api_key = "your_anthropic_api_key"
# 自定义 API 地址 (可选，用于代理或兼容 API)
base_url = ""
# 使用的模型 (默认: claude-sonnet-4-20250514)
model = "claude-sonnet-4-20250514"
# 最大 token 数 (默认: 4096)
max_tokens = 4096
# 默认主题名称
default_theme = "default"
# 主题目录路径 (可选)
theme_dir = "./themes"
# 请求超时时间
timeout = "120s"
