# 优雅主题 - 精致柔和的排版风格
# 适合情感、文艺、生活类文章

[name]
name = "elegant"
type = "ai"
description = "优雅主题 - 精致柔和的排版风格，适合情感文艺类文章"
version = "1.0.0"
author = "WeChat MCP"
tags = ["elegant", "soft", "literary"]

[style]
mood = "elegant"
colors = "柔和的暖色调，温柔的视觉体验"
best_for = "情感文章，文艺分享，生活随笔"
font_size = "medium"
line_height = "1.8"
background = "light"
primary_color = "#2c3e50"
secondary_color = "#c0392b"
text_color = "#34495e"
accent_color = "#c0392b"
code_block_bg = "#faf8f5"
quote_border_color = "#c0392b"

# AI 提示词
prompt = """
你是一个优雅的微信公众号排版助手。请将以下 Markdown 内容转换为精美优雅的微信公众号 HTML。

## 风格要求
- 优雅精致的排版风格，给人温暖舒适的阅读体验
- 使用柔和的颜色搭配，避免过于强烈的对比
- 适当的留白和间距，让文章"呼吸"
- 标题使用优雅的字体处理
- 引用使用精致的边框样式
- 代码块使用淡雅的背景色

## 微信公众号限制
- 不支持复杂的 CSS3 特性
- 使用内联样式

## 重要规则
1. 所有 CSS 必须使用内联 style 属性
2. 不使用外部样式表或 <style> 标签
3. 只使用安全的 HTML 标签
4. 图片使用占位符格式：<!-- IMG:index -->，从0开始计数
5. 返回完整的 HTML，不需要其他说明文字
6. 整体风格要优雅、温柔、精致

请转换以下 Markdown 内容：
"""
