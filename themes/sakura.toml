id = "sakura"
name = "樱花"
description = "柔粉色系日式美学，温柔感性的少女心表达"

[styles]
container = "max-width: 100%; margin: 0 auto; padding: 24px 20px 48px 20px; font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, \"Helvetica Neue\", Arial, sans-serif; font-size: 16px; line-height: 1.75 !important; color: #4a3f4f !important; background-color: #fef7f9 !important; word-wrap: break-word;"
h1 = "font-size: 32px; font-weight: 700; color: #c44569 !important; line-height: 1.3 !important; margin: 38px 0 16px; letter-spacing: -0.015em;"
h2 = "font-size: 26px; font-weight: 600; color: #c44569 !important; line-height: 1.35 !important; margin: 32px 0 16px;"
h3 = "font-size: 21px; font-weight: 600; color: #4a3f4f !important; line-height: 1.4 !important; margin: 28px 0 14px;"
h4 = "font-size: 18px; font-weight: 600; color: #4a3f4f !important; line-height: 1.4 !important; margin: 24px 0 12px;"
p = "margin: 18px 0 !important; line-height: 1.75 !important; color: #4a3f4f !important;"
strong = "font-weight: 700; color: #c44569 !important; background-color: rgba(196,69,105,0.06); padding: 0 4px; border-radius: 4px;"
em = "font-style: italic; color: #9b7fa7 !important;"
a = "color: #c44569 !important; text-decoration: none; border-bottom: 1px solid rgba(196,69,105,0.3); padding-bottom: 1px;"
ul = "margin: 16px 0; padding-left: 28px;"
ol = "margin: 16px 0; padding-left: 28px;"
li = "margin: 8px 0; line-height: 1.75 !important; color: #4a3f4f !important;"
blockquote = "margin: 24px 0; padding: 16px 20px; background-color: #fceef2 !important; border-left: 4px solid #e8a0b4; color: #6b5570 !important; border-radius: 8px;"
code = "font-family: \"SF Mono\", Consolas, monospace; padding: 3px 6px; background-color: #fceef2 !important; color: #c44569 !important; border-radius: 4px; font-size: 12px !important; line-height: 1.5 !important;"
pre = "margin: 24px 0; padding: 20px; background-color: #fceef2 !important; border-radius: 12px; overflow-x: auto; font-size: 12px !important; line-height: 1.5 !important;"
hr = "margin: 36px auto; border: none; height: 1px; background-color: #f0d4dd !important; width: 100%;"
img = "max-width: 100%; height: auto; display: block; margin: 24px auto; border-radius: 12px;"
table = "width: 100%; margin: 24px 0; border-collapse: collapse; font-size: 15px;"
th = "background-color: #fceef2 !important; padding: 12px 16px; text-align: left; font-weight: 600; color: #4a3f4f !important; border: 1px solid #f0d4dd;"
td = "padding: 12px 16px; border: 1px solid #f0d4dd; color: #4a3f4f !important;"
tr = "border: none;"
