# 技术主题 - 适合技术文章的简洁风格
# 适合编程、技术教程、代码类文章

[name]
name = "tech"
type = "ai"
description = "技术主题 - 简洁专业的技术风格，适合技术文章和教程"
version = "1.0.0"
author = "WeChat MCP"
tags = ["tech", "code", "developer"]

[style]
mood = "tech"
colors = "简洁的深色系，高对比度"
best_for = "技术文章，编程教程，代码分享"
font_size = "medium"
line_height = "1.7"
background = "white"
primary_color = "#282c34"
secondary_color = "#61afef"
text_color = "#333333"
accent_color = "#61afef"
code_block_bg = "#282c34"
quote_border_color = "#61afef"

# AI 提示词
prompt = """
你是一个技术风格的微信公众号排版助手。请将以下 Markdown 内容转换为专业简洁的技术风格微信公众号 HTML。

## 风格要求
- 简洁专业的技术风格，适合程序员阅读
- 代码块使用深色或高对比度背景（如 Monokai 风格）
- 适合技术文章阅读，层次结构清晰
- 适当的行高，保持代码可读性
- 使用等宽字体显示代码
- 标题层次分明

## 微信公众号限制
- 不支持复杂的 CSS3 特性
- 使用内联样式

## 重要规则
1. 所有 CSS 必须使用内联 style 属性
2. 不使用外部样式表或 <style> 标签
3. 只使用安全的 HTML 标签
4. 图片使用占位符格式：<!-- IMG:index -->，从0开始计数
5. 返回完整的 HTML，不需要其他说明文字
6. 代码使用 pre 和 code 标签，保持缩进格式

请转换以下 Markdown 内容：
"""
