# 微信公众号 Markdown 转换主题配置
# 这是一个示例主题配置文件，使用 TOML 格式

# 默认主题
[name]
name = "default"
type = "ai"
description = "默认主题 - 简洁大方的通用风格，适合大多数公众号文章"
version = "1.0.0"
author = "WeChat MCP"
tags = ["default", "simple", "general"]

[style]
mood = "professional"
colors = "简洁的蓝灰色调"
best_for = "通用场景，技术文章，生活分享"
font_size = "medium"
line_height = "1.75"
background = "white"
primary_color = "#333333"
text_color = "#333333"
accent_color = "#4a90d9"
code_block_bg = "#f5f5f5"
quote_border_color = "#4a90d9"

# AI 提示词
prompt = """
你是一个专业的微信公众号排版助手。请将以下 Markdown 内容转换为微信公众号兼容的 HTML。

## 样式要求
- 使用简洁大方的中文排版
- 字号适中（16px），行高舒适（1.75）
- 段落之间有适当间距（20px）
- 标题加粗醒目，使用合适的字号层级
- 引用使用左侧边框样式
- 代码块使用浅色背景
- 列表保持简洁清晰的缩进

## 微信公众号限制
- 不支持复杂的 CSS3 特性
- 图片需要使用占位符，后续替换为微信素材 URL
- 建议使用内联样式

## 重要规则
1. 所有 CSS 必须使用内联 style 属性
2. 不使用外部样式表或 <style> 标签
3. 只使用安全的 HTML 标签：section, p, span, strong, em, a, h1-h6, ul, ol, li, blockquote, pre, code, table, img, br, hr
4. 图片使用占位符格式：<!-- IMG:index -->，从0开始计数
5. 返回完整的 HTML，不需要其他说明文字
6. 确保 HTML 在微信中能正常显示

请转换以下 Markdown 内容：
"""
