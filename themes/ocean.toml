id = "ocean"
name = "深海"
description = "午夜深蓝配珊瑚橘，沉浸式的海洋系叙事感"

[styles]
container = "max-width: 100%; margin: 0 auto; padding: 24px 20px 48px 20px; font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, \"Helvetica Neue\", Arial, sans-serif; font-size: 16px; line-height: 1.7 !important; color: #c8d6e5 !important; background-color: #0c2233 !important; word-wrap: break-word;"
h1 = "font-size: 32px; font-weight: 700; color: #ff6b6b !important; line-height: 1.3 !important; margin: 38px 0 16px; letter-spacing: -0.015em;"
h2 = "font-size: 26px; font-weight: 600; color: #feca57 !important; line-height: 1.35 !important; margin: 32px 0 16px;"
h3 = "font-size: 21px; font-weight: 600; color: #54a0ff !important; line-height: 1.4 !important; margin: 28px 0 14px;"
h4 = "font-size: 18px; font-weight: 600; color: #c8d6e5 !important; line-height: 1.4 !important; margin: 24px 0 12px;"
p = "margin: 18px 0 !important; line-height: 1.7 !important; color: #c8d6e5 !important;"
strong = "font-weight: 700; color: #feca57 !important;"
em = "font-style: italic; color: #78e0a0 !important;"
a = "color: #ff6b6b !important; text-decoration: none; border-bottom: 1px solid #ff6b6b; padding-bottom: 1px;"
ul = "margin: 16px 0; padding-left: 28px;"
ol = "margin: 16px 0; padding-left: 28px;"
li = "margin: 8px 0; line-height: 1.7 !important; color: #c8d6e5 !important;"
blockquote = "margin: 24px 0; padding: 16px 20px; background-color: #152d42 !important; border-left: 4px solid #54a0ff; color: #c8d6e5 !important; border-radius: 4px;"
code = "font-family: \"SF Mono\", Consolas, monospace; padding: 3px 6px; background-color: #152d42 !important; color: #ff6b6b !important; border-radius: 4px; font-size: 12px !important; line-height: 1.5 !important;"
pre = "margin: 24px 0; padding: 20px; background-color: #152d42 !important; border-radius: 8px; overflow-x: auto; font-size: 12px !important; line-height: 1.5 !important;"
hr = "margin: 36px auto; border: none; height: 1px; background-color: #1e3a52 !important; width: 100%;"
img = "max-width: 100%; height: auto; display: block; margin: 24px auto; border-radius: 4px;"
table = "width: 100%; margin: 24px 0; border-collapse: collapse; font-size: 15px;"
th = "background-color: #152d42 !important; padding: 12px 16px; text-align: left; font-weight: 600; color: #feca57 !important; border: 1px solid #1e3a52;"
td = "padding: 12px 16px; border: 1px solid #1e3a52; color: #c8d6e5 !important;"
tr = "border: none;"
