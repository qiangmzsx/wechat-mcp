id = "medium"
name = "Medium"
description = "简约柔和的西式博客排版，适合生活志与随笔沉淀"

[styles]
container = "max-width: 100%; margin: 0 auto; padding: 24px 20px 48px 20px; font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, \"Helvetica Neue\", Arial, sans-serif; font-size: 16px; line-height: 1.85 !important; color: #242424 !important; background-color: #fcfcfc !important; word-wrap: break-word;"
h1 = "font-size: 32px; font-weight: 700; color: #111 !important; line-height: 1.3 !important; margin: 38px 0 16px; letter-spacing: -0.015em;"
h2 = "font-size: 26px; font-weight: 600; color: #111 !important; line-height: 1.35 !important; margin: 32px 0 16px;"
h3 = "font-size: 21px; font-weight: 600; color: #242424 !important; line-height: 1.4 !important; margin: 28px 0 14px;"
h4 = "font-size: 18px; font-weight: 600; color: #242424 !important; line-height: 1.4 !important; margin: 24px 0 12px;"
p = "margin: 24px 0 !important; line-height: 1.85 !important; color: #242424 !important;"
strong = "font-weight: 700; color: #000 !important;"
em = "font-style: italic; color: #666 !important;"
a = "color: #1a8917 !important; text-decoration: none; border-bottom: 1px solid #1a8917; padding-bottom: 1px;"
ul = "margin: 16px 0; padding-left: 28px;"
ol = "margin: 16px 0; padding-left: 28px;"
li = "margin: 10px 0; line-height: 1.85 !important; color: #242424 !important;"
blockquote = "margin: 24px 0; padding: 16px 20px; background-color: transparent !important; border-left: 3px solid #1a8917; color: #555 !important; border-radius: 0;"
code = "font-family: \"SF Mono\", Consolas, monospace; padding: 3px 6px; background-color: #f2f3f5 !important; color: #1a8917 !important; border-radius: 4px; font-size: 12px !important; line-height: 1.5 !important;"
pre = "margin: 24px 0; padding: 20px; background-color: #f2f3f5 !important; border-radius: 8px; overflow-x: auto; font-size: 12px !important; line-height: 1.5 !important;"
hr = "margin: 36px auto; border: none; height: 1px; background-color: #eaeaea !important; width: 100%;"
img = "max-width: 100%; height: auto; display: block; margin: 24px auto; border-radius: 4px;"
table = "width: 100%; margin: 24px 0; border-collapse: collapse; font-size: 15px;"
th = "background-color: #f2f3f5 !important; padding: 12px 16px; text-align: left; font-weight: 600; color: #242424 !important; border: 1px solid #e0e0e0;"
td = "padding: 12px 16px; border: 1px solid #e0e0e0; color: #242424 !important;"
tr = "border: none;"
