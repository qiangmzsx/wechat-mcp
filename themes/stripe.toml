id = "stripe"
name = "Stripe"
description = "前沿的硅谷极客商务风，高悬浮感与高亮视觉系"

[styles]
container = "max-width: 100%; margin: 0 auto; padding: 24px 20px 48px 20px; font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, \"Helvetica Neue\", Arial, sans-serif; font-size: 16px; line-height: 1.7 !important; color: #425466 !important; background-color: #f6f9fc !important; word-wrap: break-word;"
h1 = "font-size: 32px; font-weight: 700; color: #111 !important; line-height: 1.3 !important; margin: 38px 0 16px; letter-spacing: -0.015em;"
h2 = "font-size: 26px; font-weight: 600; color: #111 !important; line-height: 1.35 !important; margin: 32px 0 16px;"
h3 = "font-size: 21px; font-weight: 600; color: #425466 !important; line-height: 1.4 !important; margin: 28px 0 14px;"
h4 = "font-size: 18px; font-weight: 600; color: #425466 !important; line-height: 1.4 !important; margin: 24px 0 12px;"
p = "margin: 18px 0 !important; line-height: 1.7 !important; color: #425466 !important;"
strong = "font-weight: 700; color: #0a2540 !important;"
em = "font-style: italic; color: #666 !important;"
a = "color: #635bff !important; text-decoration: none; border-bottom: 1px solid #635bff; padding-bottom: 1px;"
ul = "margin: 16px 0; padding-left: 28px;"
ol = "margin: 16px 0; padding-left: 28px;"
li = "margin: 8px 0; line-height: 1.7 !important; color: #425466 !important;"
blockquote = "margin: 24px 0; padding: 16px 20px; background-color: #eef0ff !important; border-left: 4px solid #635bff; color: #425466 !important; border-radius: 4px;"
code = "font-family: \"SF Mono\", Consolas, monospace; padding: 3px 6px; background-color: #f0f2fe !important; color: #635bff !important; border-radius: 4px; font-size: 12px !important; line-height: 1.5 !important;"
pre = "margin: 24px 0; padding: 20px; background-color: #f0f2fe !important; border-radius: 8px; overflow-x: auto; font-size: 12px !important; line-height: 1.5 !important;"
hr = "margin: 36px auto; border: none; height: 1px; background-color: #e0e0e0 !important; width: 100%;"
img = "max-width: 100%; height: auto; display: block; margin: 24px auto; border-radius: 4px;"
table = "width: 100%; margin: 24px 0; border-collapse: collapse; font-size: 15px;"
th = "background-color: #f0f2fe !important; padding: 12px 16px; text-align: left; font-weight: 600; color: #425466 !important; border: 1px solid #dde0f0;"
td = "padding: 12px 16px; border: 1px solid #dde0f0; color: #425466 !important;"
tr = "border: none;"
