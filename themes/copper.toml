id = "copper"
name = "赤铜"
description = "暗夜中的青铜古韵，深沉温暖的金属质感暗色调"

[styles]
container = "max-width: 100%; margin: 0 auto; padding: 24px 20px 48px 20px; font-family: Georgia, \"Times New Roman\", Times, serif; font-size: 16px; line-height: 1.7 !important; color: #d4b896 !important; background-color: #1c1410 !important; word-wrap: break-word;"
h1 = "font-size: 32px; font-weight: 700; color: #e8a87c !important; line-height: 1.3 !important; margin: 38px 0 16px; letter-spacing: -0.015em;"
h2 = "font-size: 26px; font-weight: 600; color: #c49070 !important; line-height: 1.35 !important; margin: 32px 0 16px;"
h3 = "font-size: 21px; font-weight: 600; color: #d4b896 !important; line-height: 1.4 !important; margin: 28px 0 14px;"
h4 = "font-size: 18px; font-weight: 600; color: #d4b896 !important; line-height: 1.4 !important; margin: 24px 0 12px;"
p = "margin: 18px 0 !important; line-height: 1.7 !important; color: #d4b896 !important;"
strong = "font-weight: 700; color: #e8a87c !important;"
em = "font-style: italic; color: #b89878 !important;"
a = "color: #e8a87c !important; text-decoration: none; border-bottom: 1px solid #e8a87c; padding-bottom: 1px;"
ul = "margin: 16px 0; padding-left: 28px;"
ol = "margin: 16px 0; padding-left: 28px;"
li = "margin: 8px 0; line-height: 1.7 !important; color: #d4b896 !important;"
blockquote = "margin: 24px 0; padding: 16px 20px; background-color: #2a1e16 !important; border-left: 4px solid #b8734a; color: #c0a080 !important; border-radius: 4px;"
code = "font-family: \"SF Mono\", Consolas, monospace; padding: 3px 6px; background-color: #2a1e16 !important; color: #e8a87c !important; border-radius: 4px; font-size: 12px !important; line-height: 1.5 !important;"
pre = "margin: 24px 0; padding: 20px; background-color: #2a1e16 !important; border-radius: 8px; overflow-x: auto; font-size: 12px !important; line-height: 1.5 !important;"
hr = "margin: 36px auto; border: none; height: 1px; background-color: #3a2a1e !important; width: 100%;"
img = "max-width: 100%; height: auto; display: block; margin: 24px auto; border-radius: 4px;"
table = "width: 100%; margin: 24px 0; border-collapse: collapse; font-size: 15px;"
th = "background-color: #2a1e16 !important; padding: 12px 16px; text-align: left; font-weight: 600; color: #e8a87c !important; border: 1px solid #3a2a1e;"
td = "padding: 12px 16px; border: 1px solid #3a2a1e; color: #d4b896 !important;"
tr = "border: none;"
