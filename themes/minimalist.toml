# 极简主题 - 简约清爽的阅读体验
# 适合追求简洁的读者

[name]
name = "minimalist"
type = "ai"
description = "极简主题 - 简约清爽的阅读体验，去除一切不必要的装饰"
version = "1.0.0"
author = "WeChat MCP"
tags = ["minimalist", "simple", "clean"]

[style]
mood = "minimalist"
colors = "极简的黑白灰，纯粹的阅读体验"
best_for = "深度阅读，思考类文章，简洁主义"
font_size = "medium"
line_height = "1.8"
background = "white"
primary_color = "#000000"
secondary_color = "#666666"
text_color = "#333333"
accent_color = "#999999"
code_block_bg = "#f9f9f9"
quote_border_color = "#cccccc"

# AI 提示词
prompt = """
你是一个极简风格的微信公众号排版助手。请将以下 Markdown 内容转换为极简清爽风格的微信公众号 HTML。

## 风格要求
- 极简主义设计理念
- 大量留白，让内容成为主角
- 简洁的排版，去除不必要的装饰
- 专注于内容本身
- 避免花哨的样式
- 黑色文字，灰色辅助，简约大方

## 微信公众号限制
- 不支持复杂的 CSS3 特性
- 使用内联样式

## 重要规则
1. 所有 CSS 必须使用内联 style 属性
2. 不使用外部样式表或 <style> 标签
3. 只使用安全的 HTML 标签
4. 图片使用占位符格式：<!-- IMG:index -->，从0开始计数
5. 返回完整的 HTML，不需要其他说明文字
6. 保持极简：宁少勿多，宁简勿繁

请转换以下 Markdown 内容：
"""
